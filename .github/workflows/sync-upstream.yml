name: Sync upstream cimon release

on:
  schedule:
    - cron: '0 9 1 */3 *'  # quarterly, 1st of every 3rd month at 09:00 UTC
  workflow_dispatch:        # allow manual trigger

jobs:
  sync:
    name: Download and verify latest upstream release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Get latest upstream release
        id: upstream
        run: |
          RELEASE=$(curl -fsSL \
            -H "Authorization: Bearer ${{ github.token }}" \
            https://api.github.com/repos/CycodeLabs/cimon-releases/releases/latest)

          TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Latest upstream release: $TAG"

      - name: Check if already mirrored
        id: check
        run: |
          STATUS=$(curl -o /dev/null -w "%{http_code}" -sSL \
            -H "Authorization: Bearer ${{ github.token }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.upstream.outputs.tag }})

          if [ "$STATUS" = "200" ]; then
            echo "already_mirrored=true" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.upstream.outputs.tag }} already mirrored — nothing to do"
          else
            echo "already_mirrored=false" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.upstream.outputs.tag }} not yet mirrored"
          fi

      - name: Download artifacts
        if: steps.check.outputs.already_mirrored == 'false'
        run: |
          TAG=${{ steps.upstream.outputs.tag }}
          BASE="https://github.com/CycodeLabs/cimon-releases/releases/download/${TAG}"

          curl -fsSL "${BASE}/cimon_linux_x86_64.tar.gz" -o cimon_linux_x86_64.tar.gz
          curl -fsSL "${BASE}/cimon_linux_arm64.tar.gz"  -o cimon_linux_arm64.tar.gz
          curl -fsSL "${BASE}/checksums.txt"             -o checksums.txt

      - name: Verify checksums
        if: steps.check.outputs.already_mirrored == 'false'
        run: |
          sha256sum --check --ignore-missing checksums.txt
          echo "Checksums verified"

      - name: Create release and upload artifacts
        if: steps.check.outputs.already_mirrored == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${{ steps.upstream.outputs.tag }}

          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "$TAG" \
            --notes "Mirrored from CycodeLabs/cimon-releases@${TAG}" \
            cimon_linux_x86_64.tar.gz \
            cimon_linux_arm64.tar.gz \
            checksums.txt

          echo "Release $TAG created with artifacts"

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${{ steps.upstream.outputs.tag }}

          gh issue create \
            --repo ${{ github.repository }} \
            --title "Failed to mirror upstream release ${TAG}" \
            --label "sync-failure" \
            --body "The automated sync workflow failed to mirror **${TAG}** from CycodeLabs/cimon-releases.

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Check the run logs and mirror manually if needed."
